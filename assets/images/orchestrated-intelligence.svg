<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    Design System: Dark Architectural 
    Colors: Slate-900 (#0f172a), Slate-800 (#1e293b), Blue-500 (#3b82f6), Purple-500 (#a855f7), Emerald-500 (#10b981), Rose-500 (#f43f5e)
  -->
  
  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
    <!-- Glow Effect (Subtle) -->
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
   <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a" rx="12" />
  <rect width="100%" height="100%" fill="url(#grid)" rx="12" opacity="0.5" />

  <!-- 1. Human (Strategist) -->
  <g transform="translate(60, 180)">
    <circle cx="20" cy="20" r="35" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="20" y="28" text-anchor="middle" font-size="24">👤</text>
    <text x="20" y="75" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-weight="600" font-size="14">Human</text>
    <text x="20" y="92" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Strategy &amp; Intent</text>
  </g>

  <!-- Connector: Human -> Orchestrator -->
  <line x1="120" y1="200" x2="210" y2="200" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowhead)" />

  <!-- 2. Orchestrator (Central Hub) -->
  <g transform="translate(250, 160)">
    <!-- Hexagon-ish Shape -->
    <path d="M 40 0 L 80 20 L 80 60 L 40 80 L 0 60 L 0 20 Z" fill="#1e293b" stroke="#a855f7" stroke-width="2" />
    <text x="40" y="48" text-anchor="middle" font-size="22">⚡</text>
    <text x="40" y="100" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-weight="600" font-size="14">Orchestrator</text>
  </g>

  <!-- Swarm Container -->
  <rect x="370" y="60" width="220" height="280" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" stroke-dasharray="4,4" opacity="0.5" />
  <text x="480" y="85" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" letter-spacing="1">AGENT SWARM</text>

  <!-- 3. Agents (Parallel Execution) -->
  <!-- Architect -->
  <g transform="translate(410, 110)">
    <rect width="140" height="40" rx="6" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="70" y="25" text-anchor="middle" fill="#e0f2fe" font-family="system-ui, sans-serif" font-size="12">📐 Architect Agent</text>
  </g>
  <!-- Builder -->
  <g transform="translate(410, 170)">
    <rect width="140" height="40" rx="6" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="70" y="25" text-anchor="middle" fill="#e0f2fe" font-family="system-ui, sans-serif" font-size="12">🔨 Builder Agent</text>
  </g>
  <!-- Critic (Internal) -->
  <g transform="translate(410, 230)">
     <rect width="140" height="40" rx="6" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
     <text x="70" y="25" text-anchor="middle" fill="#e0f2fe" font-family="system-ui, sans-serif" font-size="12">📜 Doc Agent</text>
  </g>

  <!-- Connectors: Orchestrator -> Swarm -->
  <path d="M 330 200 C 370 200, 360 130, 410 130" fill="none" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <path d="M 330 200 C 370 200, 360 190, 410 190" fill="none" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <path d="M 330 200 C 370 200, 360 250, 410 250" fill="none" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- 4. The Auditor (Gatekeeper) -->
  <g transform="translate(650, 160)">
    <circle cx="40" cy="40" r="35" fill="#1e293b" stroke="#f43f5e" stroke-width="2"/>
    <text x="40" y="48" text-anchor="middle" font-size="22">🛡️</text>
    <text x="40" y="95" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-weight="600" font-size="14">Auditor</text>
    <text x="40" y="112" text-anchor="middle" fill="#fda4af" font-family="system-ui, sans-serif" font-size="11">Reject / Approve</text>
  </g>

  <!-- Connectors: Swarm -> Auditor -->
  <path d="M 550 130 C 600 130, 600 180, 640 190" fill="none" stroke="#64748b" stroke-width="1" />
  <path d="M 550 190 C 580 190, 600 195, 640 200" fill="none" stroke="#64748b" stroke-width="1" />
  <path d="M 550 250 C 600 250, 600 210, 640 210" fill="none" stroke="#64748b" stroke-width="1" />

  <!-- Loopback: Auditor -> Orchestrator (Reject) -->
  <path d="M 650 160 C 650 40, 300 40, 290 160" fill="none" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)" />
  <text x="470" y="30" text-anchor="middle" fill="#f43f5e" font-family="system-ui, sans-serif" font-weight="bold" font-size="10">REJECT &amp; REFINE Loop</text>

  <!-- Output: Ship -->
  <g transform="translate(740, 185)">
     <line x1="0" y1="15" x2="30" y2="15" stroke="#10b981" stroke-width="4" marker-end="url(#arrowhead)" />
  </g>

</svg>
